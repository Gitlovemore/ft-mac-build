html, body {
  width: 100%; height: 100%;
  overflow: hidden; background: transparent;
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  -webkit-font-smoothing: antialiased;
  user-select: none;
}

#app { width: 100%; height: 100%; position: relative; padding: 12px; box-sizing: border-box; overflow: hidden; }

/* ── FAB ── */
#fab {
  position: absolute; top: 12px; right: 12px;
  width: 52px; height: 52px; border-radius: 15px;
  background: linear-gradient(145deg, var(--acc), var(--acc2));
  box-shadow: 0 6px 24px rgba(124,110,247,.6);
  display: flex; align-items: center; justify-content: center;
  cursor: grab; z-index: 100;
  /* No transform transition — prevents scale glitching during drag */
  transition: box-shadow .2s ease;
  will-change: box-shadow;
}
#fab:hover { box-shadow: 0 10px 32px rgba(124,110,247,.75); }
#fab.dragging {
  cursor: grabbing;
  transform: none !important;
  transition: none !important;
}
#fab svg { width: 22px; height: 22px; fill: #fff; pointer-events: none; }

#badge {
  position: absolute; top: -6px; right: -6px;
  min-width: 18px; height: 18px; padding: 0 4px; border-radius: 9px;
  background: var(--red); color: #fff; font-size: 10px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 6px rgba(255,77,109,.5); pointer-events: none;
  transition: transform .25s cubic-bezier(.34,1.56,.64,1);
}
#badge.hide { transform: scale(0); }
#badge.pop  { animation: bpop .28s cubic-bezier(.34,1.56,.64,1); }
@keyframes bpop { 50%{transform:scale(1.5);} }

/* ── Panel ── */
#panel {
  position: absolute; top: 74px; right: 12px;
  width: 358px; max-height: 580px;
  background: var(--bg);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border: 1px solid var(--bdr); border-radius: 18px;
  box-shadow: 0 32px 80px rgba(0,0,0,.7), inset 0 0 0 1px rgba(255,255,255,.04);
  display: flex; flex-direction: column; overflow: hidden;
  transform-origin: top right;
  transition: none;
  z-index: 99;
}
#panel.hide { opacity: 0; pointer-events: none; visibility: hidden; transform: none; }

/* Header */
.hd { padding: 16px 16px 12px; border-bottom: 1px solid var(--bdr); flex-shrink: 0; }
.hd-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.hd-title { font-size: 10px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--mute); }
.hd-count { font-size: 20px; font-weight: 300; color: #fff; margin-top: 2px; line-height: 1.2; }
.hd-count .w { color: #3b9eff; font-weight: 700; }
.hd-count .s { color: #f97316; font-weight: 700; }
.hd-actions { display: flex; gap: 6px; flex-shrink: 0; }

.icon-btn {
  width: 30px; height: 30px; border-radius: 8px;
  background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
  color: rgba(255,255,255,.45); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s; flex-shrink: 0;
}
.icon-btn:hover { background: rgba(255,255,255,.12); color: #fff; }
.icon-btn svg { width: 13px; height: 13px; fill: currentColor; }
.icon-btn.inspo { color: var(--gold); border-color: rgba(245,158,11,.25); }
.icon-btn.inspo:hover { background: rgba(245,158,11,.12); color: #fbbf24; border-color: rgba(245,158,11,.4); }

/* Stats */
.stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 7px; margin-top: 11px; }
.stat { background: var(--card); border: 1px solid var(--bdr); border-radius: 10px; padding: 9px 10px; }
.stat-label { font-size: 10px; color: var(--mute); letter-spacing: .5px; }
.stat-val { font-size: 20px; font-weight: 300; margin-top: 1px; }
.stat-val.blue   { color: #3b9eff; }
.stat-val.orange { color: #f97316; }
.stat-val.green  { color: #4ade80; }

/* ── MIT: Most Important Task ── */
#mit-wrap {
  margin-top: 10px;
  background: linear-gradient(135deg, rgba(245,158,11,.1), rgba(249,115,22,.08));
  border: 1px solid rgba(245,158,11,.28);
  border-radius: 11px;
  padding: 8px 11px 9px;
  transition: border-color .2s, background .2s;
  position: relative;
  overflow: hidden;
}
#mit-wrap::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: linear-gradient(180deg, var(--gold), var(--gold2));
  border-radius: 3px 0 0 3px;
}
#mit-wrap:focus-within { border-color: rgba(245,158,11,.55); background: linear-gradient(135deg,rgba(245,158,11,.13),rgba(249,115,22,.1)); }
.mit-label {
  display: flex; align-items: center; gap: 5px;
  font-size: 9px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
  color: rgba(245,158,11,.75); margin-bottom: 5px; padding-left: 2px;
}
.mit-label svg { width: 11px; height: 11px; fill: rgba(245,158,11,.75); flex-shrink: 0; }
#mit-input {
  width: 100%; background: transparent; border: none; outline: none;
  font-size: 13px; font-weight: 500; color: var(--text);
  font-family: inherit; line-height: 1.4;
  caret-color: var(--gold);
  resize: none; overflow: hidden; min-height: 20px;
}
#mit-input::placeholder { color: rgba(255,255,255,.22); font-weight: 400; }
.mit-meta {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 6px;
}
.mit-tab-sel { display: flex; gap: 4px; }
.mit-tab-btn {
  padding: 2px 8px; border-radius: 5px; font-size: 10px; font-weight: 600;
  cursor: pointer; border: 1px solid rgba(255,255,255,.1);
  background: rgba(255,255,255,.05); color: rgba(255,255,255,.35);
  transition: all .15s; font-family: inherit;
}
.mit-tab-btn.on-all  { background: rgba(168,139,250,.18); border-color: rgba(168,139,250,.4); color: #a78bfa; }
.mit-tab-btn.on-work { background: rgba(59,158,255,.18);  border-color: rgba(59,158,255,.4);  color: #3b9eff; }
.mit-tab-btn.on-self { background: rgba(249,115,22,.18);  border-color: rgba(249,115,22,.4);  color: #f97316; }
.mit-tab-btn.mit-disabled { opacity: 0.3; pointer-events: none; cursor: not-allowed; }
.tab.mit-disabled { opacity: 0.3; pointer-events: none; cursor: not-allowed; }
.mit-hint { font-size: 9px; color: rgba(255,255,255,.2); }
.mit-input-row { display: flex; align-items: flex-start; gap: 8px; }
.mit-input-row #mit-input { flex: 1; }
.mit-clear-btn {
  flex-shrink: 0; margin-top: 2px; width: 24px; height: 24px;
  border-radius: 6px; border: 1px solid rgba(245,158,11,.2);
  background: rgba(245,158,11,.08); color: rgba(245,158,11,.6);
  cursor: pointer; font-size: 10px; line-height: 1; display: flex; align-items: center; justify-content: center;
  transition: background .15s, color .15s; opacity: 0;
}
.mit-input-row:hover .mit-clear-btn { opacity: 1; }
.mit-clear-btn:hover { background: rgba(245,158,11,.2); color: #f97316; }
#mit-tasks { display: flex; flex-direction: column; gap: 4px; margin-top: 8px; }
.mit-task-item {
  display: flex; align-items: center; gap: 8px; padding: 6px 8px;
  border-radius: 8px; background: rgba(255,255,255,.04);
  border: 1px solid rgba(245,158,11,.15); transition: background .15s;
}
.mit-task-item:hover { background: rgba(245,158,11,.08); }
.mit-task-item.done { opacity: 0.45; }
.mit-task-item.done .mit-task-text { text-decoration: line-through; }
.mit-task-check {
  flex-shrink: 0; width: 18px; height: 18px; border-radius: 50%;
  border: 1.5px solid rgba(245,158,11,.4); background: transparent;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background .15s, border-color .15s;
}
.mit-task-check.done { background: #f97316; border-color: #f97316; }
.mit-task-check::after { content: ' '; width: 6px; height: 3px; border-left: 1.5px solid #fff; border-bottom: 1.5px solid #fff; transform: rotate(-45deg) translateY(-1px); display: none; }
.mit-task-check.done::after { display: block; }
.mit-task-text { flex: 1; font-size: 12px; color: var(--text); line-height: 1.4; }
.mit-task-del {
  flex-shrink: 0; width: 20px; height: 20px; border-radius: 50%;
  background: transparent; border: none; color: rgba(255,255,255,.2);
  cursor: pointer; font-size: 10px; display: flex; align-items: center; justify-content: center;
  transition: color .15s, background .15s; opacity: 0;
}
.mit-task-item:hover .mit-task-del { opacity: 1; }
.mit-task-del:hover { color: #ef4444; background: rgba(239,68,68,.12); }
.mit-edit-inp {
  flex: 1; font-size: 12px; color: var(--text); line-height: 1.4;
  background: rgba(124,110,247,.08); border: 1px solid rgba(124,110,247,.4);
  border-radius: 6px; padding: 2px 6px; outline: none; font-family: inherit;
}
#mit-wrap.hidden { display: none; }

/* Tabs */
.tabs { display: flex; border-bottom: 1px solid var(--bdr); flex-shrink: 0; }
.tab {
  flex: 1; padding: 9px 0; text-align: center;
  font-size: 12px; font-weight: 600; cursor: pointer;
  color: var(--mute); border: none; background: none;
  position: relative; transition: color .18s; letter-spacing: .4px;
}
.tab::after {
  content: ''; position: absolute; bottom: 0; left: 20%; right: 20%;
  height: 2px; border-radius: 1px;
  transform: scaleX(0); transition: transform .22s cubic-bezier(.34,1.2,.64,1);
}
.tab.all::after  { background: linear-gradient(90deg,var(--acc),var(--acc2)); }
.tab.work::after { background: linear-gradient(90deg,var(--work),var(--work2)); }
.tab.self::after { background: linear-gradient(90deg,var(--self),var(--self2)); }
.tab.all.on  { color: #a78bfa; }
.tab.work.on { color: var(--work); }
.tab.self.on { color: var(--self); }
.tab.on::after { transform: scaleX(1); }
.tab-badge {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 14px; height: 14px; padding: 0 3px;
  border-radius: 7px; font-size: 9px; font-weight: 700;
  margin-left: 4px; vertical-align: middle;
  transition: transform .2s cubic-bezier(.34,1.56,.64,1);
}
.tab.all  .tab-badge { background: rgba(168,139,250,.2); color: #a78bfa; }
.tab.work .tab-badge { background: rgba(59,158,255,.2);  color: var(--work); }
.tab.self .tab-badge { background: rgba(249,115,22,.2);  color: var(--self); }
.tab-badge.zero { transform: scale(0); }

/* Input */
.inp-row { padding: 8px 12px; border-bottom: 1px solid var(--bdr); display: flex; gap: 7px; flex-shrink: 0; }
.inp {
  flex: 1; background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.1); border-radius: 9px;
  padding: 7px 11px; color: var(--text); font-size: 13px;
  outline: none; transition: border-color .2s, background .2s; font-family: inherit;
}
.inp::placeholder { color: rgba(255,255,255,.22); }
.inp.work:focus { border-color: rgba(59,158,255,.5); background: rgba(59,158,255,.07); }
.inp.self:focus { border-color: rgba(249,115,22,.5);  background: rgba(249,115,22,.07); }
.add-btn {
  width: 32px; height: 32px; border-radius: 8px; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform .15s; flex-shrink: 0;
}
.add-btn.work { background: linear-gradient(145deg,var(--work),var(--work2)); }
.add-btn.self { background: linear-gradient(145deg,var(--self),var(--self2)); }
.add-btn:hover { transform: scale(1.08); }
.add-btn:active { transform: scale(.93); }
.add-btn svg { width: 14px; height: 14px; fill: #fff; }

/* List */
.list { overflow-y: auto; flex: 1; padding: 4px 0; }
.list::-webkit-scrollbar { width: 3px; }
.list::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 2px; }
.grp-hd {
  font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
  color: rgba(255,255,255,.2); padding: 10px 14px 5px;
  display: flex; align-items: center; gap: 8px;
}
.grp-hd::after { content: ''; flex: 1; height: 1px; background: var(--bdr); }
.item {
  display: flex; align-items: center; padding: 7px 12px; gap: 9px;
  transition: background .12s; animation: rowIn .22s cubic-bezier(.34,1.2,.64,1) both;
}
@keyframes rowIn { from{opacity:0;transform:translateX(10px);} }
.item:hover { background: rgba(255,255,255,.04); }
.dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.dot.work { background: #3b9eff; box-shadow: 0 0 4px rgba(59,158,255,.5); }
.dot.self { background: #f97316; box-shadow: 0 0 4px rgba(249,115,22,.5); }
.chk {
  width: 17px; height: 17px; border-radius: 5px; flex-shrink: 0; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all .18s;
}
.chk svg { opacity: 0; transition: opacity .14px; width: 10px; height: 10px; }
.item.work-i .chk { border: 1.5px solid rgba(59,158,255,.35); }
.item.self-i .chk { border: 1.5px solid rgba(249,115,22,.35); }
.item.work-i .chk:hover { border-color:var(--work); background:rgba(59,158,255,.12); }
.item.self-i .chk:hover { border-color:var(--self); background:rgba(249,115,22,.12); }
.item.done.work-i .chk { background:linear-gradient(145deg,var(--work),var(--work2)); border-color:transparent; }
.item.done.self-i .chk { background:linear-gradient(145deg,var(--self),var(--self2)); border-color:transparent; }
.item.done .chk svg { opacity: 1; }
.txt { flex: 1; font-size: 13px; color: var(--text); line-height: 1.4; word-break: break-all; }
.item.done .txt { color: rgba(255,255,255,.22); text-decoration: line-through; }
/* ── migrated (carried-over) items ── */
.item.migrated        { border-left: 2px solid rgba(255,77,77,.5); padding-left: 10px; }
.item.migrated .txt   { color: rgba(255,120,120,.85); }
.item.migrated .dot.work { background: #ff5555; box-shadow: 0 0 4px rgba(255,85,85,.5); }
.item.migrated .dot.self { background: #ff5555; box-shadow: 0 0 4px rgba(255,85,85,.5); }
/* done-partial: kept progress, struck but not 100 */
.item.done-partial .txt { color: rgba(255,255,255,.35); text-decoration: line-through; }
.item.done-partial .item-progress { color: rgba(255,200,80,.6); }
/* done-zero: nothing done, red strike */
.item.done-zero .txt { color: rgba(255,100,100,.45); text-decoration: line-through; }
.item.done-zero .item-progress { color: rgba(255,100,100,.5); }
/* inline progress input (hidden by default) */
.prog-input {
  width: 44px; font-size: 11px; font-weight: 700; font-family: 'SF Mono', monospace;
  text-align: right; background: rgba(255,255,255,.1); border: 1px solid var(--acc);
  border-radius: 4px; color: #fff; outline: none; padding: 1px 4px;
  display: none; flex-shrink: 0;
}
body.light .item.migrated .txt { color: rgba(180,40,40,.85); }
body.light .item.done-partial .txt { color: rgba(20,20,40,.4); }
body.light .item.done-zero .txt   { color: rgba(180,40,40,.5); }
.item-time { font-size: 10px; color: rgba(255,255,255,.18); flex-shrink: 0; font-family: 'SF Mono', monospace; }
/* ── drag handle ── */
.drag-handle {
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; width: 14px; cursor: grab; opacity: 0;
  transition: opacity .15s; color: rgba(255,255,255,.25);
  font-size: 13px; line-height: 1; user-select: none;
}
.item:hover .drag-handle { opacity: 1; }
.drag-handle:active { cursor: grabbing; }
.item.drag-over-top    { border-top: 2px solid rgba(124,110,247,.7); }
.item.drag-over-bottom { border-bottom: 2px solid rgba(124,110,247,.7); }
.item.dragging         { opacity: .35; }
body.light .drag-handle { color: rgba(26,26,46,.3); }
body.light .item.drag-over-top    { border-top: 2px solid rgba(124,110,247,.5); }
body.light .item.drag-over-bottom { border-bottom: 2px solid rgba(124,110,247,.5); }
.prog-inp { width: 36px; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.15); border-radius: 4px; padding: 2px 4px; color: #fff; font-size: 11px; text-align: center; }
.prog-inp::placeholder { color: rgba(255,255,255,.3); }
.prog-inp:focus { border-color: rgba(124,110,247,.6); outline: none; }
.item-progress {
  font-size: 11px; color: rgba(255,255,255,.25); min-width: 24px; text-align: right; cursor: pointer;
  flex-shrink: 0; user-select: none; padding: 2px 4px; border-radius: 4px;
}
.item-progress:hover { color: rgba(255,255,255,.5); background: rgba(255,255,255,.06); }
.item.has-progress .item-progress { color: #ff6b6b; font-weight: 600; }
.item.has-progress .item-progress:hover { background: rgba(255,107,107,.08); }
body.light .prog-inp { background: rgba(16,185,129,.06); border-color: rgba(16,185,129,.25); color: rgba(6,78,59,.85); }
body.light .prog-inp::placeholder { color: rgba(6,78,59,.32); }
body.light .item-progress { color: rgba(6,78,59,.3); }
body.light .item-progress:hover { color: rgba(16,185,129,.7); background: rgba(16,185,129,.08); }
body.light .has-progress .item-progress { color: #f97316; font-weight: 600; }
body.light .has-progress .item-progress:hover { background: rgba(249,115,22,.07); }
.del {
  width: 19px; height: 19px; border-radius: 5px;
  background: transparent; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.edit-inp {
  flex: 1; font-size: 13px; color: #fff; background: rgba(255,255,255,.08);
  border: 1px solid rgba(124,110,247,.5); border-radius: 4px;
  padding: 1px 6px; outline: none; font-family: inherit;
}
body.light .edit-inp { color: rgba(20,20,40,.88); background: rgba(0,0,0,.04); border-color: rgba(124,110,247,.35); }
.edit-ta {
  width: 100%; font-size: 13px; color: rgba(255,255,255,.85); line-height: 1.55;
  background: rgba(255,255,255,.06); border: 1px solid rgba(245,158,11,.4);
  border-radius: 6px; padding: 8px 10px; outline: none; resize: vertical;
  font-family: inherit; word-break: break-all; box-sizing: border-box;
}
body.light .edit-ta { color: rgba(20,20,40,.85); background: rgba(0,0,0,.03); border-color: rgba(245,158,11,.3); }
.del {
  opacity: 0; transition: opacity .15s, background .15s; flex-shrink: 0;
}
.del svg { width: 11px; height: 11px; fill: var(--red); }
.item:hover .del { opacity: 1; }
.del:hover { background: rgba(255,77,109,.15); }
.item.out { animation: rowOut .2s ease forwards; }
@keyframes rowOut { to{opacity:0;transform:translateX(14px);max-height:0;padding-top:0;padding-bottom:0;} }
.empty {
  padding: 32px 16px; text-align: center;
  color: rgba(255,255,255,.16); font-size: 13px;
  display: none; flex-direction: column; align-items: center; gap: 6px;
}
.empty.show { display: flex; }
.empty svg { opacity: .15; }

/* Footer */
.ft {
  padding: 8px 12px; border-top: 1px solid var(--bdr);
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.ft-info { font-size: 10px; color: rgba(255,255,255,.18); font-family: 'SF Mono', monospace; }
.ft-btns { display: flex; gap: 10px; }
.ft-btn {
  font-size: 10px; color: rgba(168,139,250,.5);
  background: none; border: none; cursor: pointer;
  font-family: inherit; transition: color .15s; padding: 0;
}
.ft-btn:hover { color: #a78bfa; }
.ft-btn.active { color: #a78bfa; }
.ft-btn.toggle-done { color: rgba(255,255,255,.35); }
.ft-btn.toggle-done:hover { color: rgba(255,255,255,.6); }

/* ══════════════════════════════════
   INSPIRATION VAULT — Fixed position, no transform
══════════════════════════════════ */
#inspo-overlay {
  position: absolute; inset: 0; z-index: 1100;
  opacity: 0; pointer-events: none;
  transition: opacity .2s ease;
}
#inspo-overlay.show { opacity: 1; pointer-events: all; }

/* Always anchored below the FAB button (top-right area) */
#inspo-wrap {
  position: absolute;
  top: 68px;    /* Below the FAB button (top:12 + 52px height + 4px gap) */
  right: 12px;  /* Aligned with right edge of #app padding */
  width: 360px;
  height: 520px;  /* 改为固定高度 */
  max-height: 520px;
  background: rgba(12,12,24,0.97);
  border: 1px solid rgba(245,158,11,.16);
  border-radius: 16px;
  box-shadow: 0 20px 60px rgba(0,0,0,.7), inset 0 0 0 1px rgba(255,255,255,.04);
  display: flex; 
  flex-direction: column; 
  overflow: hidden;
  opacity: 0;
  transform: translateY(-6px);
  transition: opacity .2s ease, transform .2s ease;
  pointer-events: none;
}
#inspo-overlay.show #inspo-wrap {
  opacity: 1;
  transform: translateY(0);
  pointer-events: all;
}

#inspo-panel {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}

.inspo-hd {
  padding: 18px 20px 14px; border-bottom: 1px solid rgba(255,255,255,.06);
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  background: linear-gradient(180deg,rgba(245,158,11,.04) 0%,transparent 100%);
}
.inspo-hd-left { display: flex; align-items: center; gap: 11px; }
.inspo-icon {
  width: 36px; height: 36px; border-radius: 11px;
  background: linear-gradient(145deg,var(--gold),var(--gold2));
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 14px rgba(245,158,11,.4); flex-shrink: 0;
}
.inspo-icon svg { width: 17px; height: 17px; fill: #fff; }
.inspo-title { font-size: 16px; font-weight: 500; color: #fff; }
.inspo-sub   { font-size: 11px; color: rgba(255,255,255,.28); margin-top: 2px; }
.inspo-close {
  width: 28px; height: 28px; border-radius: 7px;
  background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
  color: rgba(255,255,255,.45); cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all .15s;
}
.inspo-close:hover { background: rgba(255,255,255,.12); color: #fff; }
.inspo-close svg { width: 12px; height: 12px; fill: currentColor; }

.inspo-inp-wrap {
  padding: 13px 16px 11px; border-bottom: 1px solid rgba(255,255,255,.06); flex-shrink: 0;
}
.inspo-textarea {
  width: 100%; background: rgba(255,255,255,.05);
  border: 1px solid rgba(245,158,11,.18); border-radius: 10px;
  padding: 10px 13px; color: var(--text); font-size: 13px;
  outline: none; resize: none; height: 76px;
  font-family: inherit; line-height: 1.55;
  transition: border-color .2s, background .2s;
}
.inspo-textarea::placeholder { color: rgba(255,255,255,.2); }
.inspo-textarea:focus { border-color: rgba(245,158,11,.5); background: rgba(245,158,11,.04); }
.inspo-inp-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 9px; }
.inspo-tags-wrap { display: flex; gap: 5px; flex-wrap: wrap; }
.inspo-tag-btn {
  padding: 4px 10px; border-radius: 6px; font-size: 11px; cursor: pointer;
  background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1);
  color: rgba(255,255,255,.4); transition: all .15s; font-family: inherit;
}
.inspo-tag-btn:hover { background: rgba(245,158,11,.12); border-color: rgba(245,158,11,.3); color: #fbbf24; }
.inspo-tag-btn.sel  { background: rgba(245,158,11,.16); border-color: rgba(245,158,11,.4); color: #fbbf24; }
.inspo-save-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 7px 15px; border-radius: 8px;
  background: linear-gradient(135deg,var(--gold),var(--gold2));
  border: none; color: #fff; font-size: 12px; font-weight: 600;
  cursor: pointer; transition: opacity .15s, transform .1s; font-family: inherit; white-space: nowrap;
}
.inspo-save-btn:hover { opacity: .88; }
.inspo-save-btn:active { transform: scale(.96); }
.inspo-save-btn svg { width: 12px; height: 12px; fill: #fff; }

.inspo-search-wrap {
  padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,.06);
  display: flex; flex-direction: column; gap: 8px; flex-shrink: 0;
}
.inspo-search {
  width: 100%; background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.08); border-radius: 8px;
  padding: 6px 10px; color: var(--text); font-size: 12px;
  outline: none; font-family: inherit; transition: border-color .2s;
  box-sizing: border-box;
}
.inspo-search:focus { border-color: rgba(245,158,11,.35); }
.inspo-search::placeholder { color: rgba(255,255,255,.2); }
.inspo-filter-tags { display: flex; gap: 4px; flex-wrap: nowrap; }
.filter-tag {
  flex: 1; text-align: center;
  padding: 5px 0; border-radius: 6px; font-size: 13px; cursor: pointer;
  background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.08);
  color: rgba(255,255,255,.4); transition: all .15s; white-space: nowrap;
}
.filter-tag:hover { border-color: rgba(245,158,11,.3); color: #fbbf24; }
.filter-tag.on { background: rgba(245,158,11,.16); border-color: rgba(245,158,11,.45); color: #fbbf24; }

.inspo-list {
  flex: 1 1 0;
  min-height: 100px;  /* 设置最小高度确保可见 */
  overflow-y: auto;
  overflow-x: hidden;
  padding: 6px 0;
  scroll-behavior: smooth;
  overscroll-behavior: contain;
  background: rgba(255,255,255,.01);  /* 调试：添加淡背景看是否显示 */
}
.inspo-list::-webkit-scrollbar { width: 8px; }
.inspo-list::-webkit-scrollbar-track { background: rgba(255,255,255,.03); border-radius: 4px; }
.inspo-list::-webkit-scrollbar-thumb { background: rgba(245,158,11,.35); border-radius: 4px; }
.inspo-list::-webkit-scrollbar-thumb:hover { background: rgba(245,158,11,.55); }
.inspo-empty {
  padding: 44px 20px; text-align: center;
  color: rgba(255,255,255,.2); font-size: 13px;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
}
.inspo-empty-icon { font-size: 34px; opacity: .35; }

.inspo-card {
  margin: 5px 14px; padding: 12px 14px;
  background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.07);
  border-radius: 12px;
  animation: cardIn .2s cubic-bezier(.34,1.2,.64,1) both;
  transition: background .15s, border-color .15s;
}
@keyframes cardIn { from{opacity:0;transform:translateY(6px);} }
.inspo-card:hover { background: rgba(255,255,255,.06); border-color: rgba(245,158,11,.18); }
.inspo-card-tag {
  display: inline-flex; align-items: center;
  padding: 2px 8px; border-radius: 5px; font-size: 10px; font-weight: 600; margin-bottom: 7px;
}
.inspo-card-tag.idea    { background: rgba(168,139,250,.15); color: #a78bfa; }
.inspo-card-tag.product { background: rgba(59,158,255,.15);  color: #3b9eff; }
.inspo-card-tag.life    { background: rgba(74,222,128,.15);  color: #4ade80; }
.inspo-card-tag.other   { background: rgba(255,255,255,.08); color: rgba(255,255,255,.45); }
.inspo-card-txt { font-size: 13px; color: rgba(255,255,255,.82); line-height: 1.55; word-break: break-all; }
.inspo-card-ft  { display: flex; align-items: center; justify-content: space-between; margin-top: 9px; }
.inspo-card-date { font-size: 10px; color: rgba(255,255,255,.22); font-family: 'SF Mono', monospace; }
.inspo-card-del {
  width: 22px; height: 22px; border-radius: 5px;
  background: transparent; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity .15s, background .15s;
}
.inspo-card-del svg { width: 11px; height: 11px; fill: var(--red); }
.inspo-card:hover .inspo-card-del { opacity: 1; }
.inspo-card-del:hover { background: rgba(255,77,109,.15); }

/* 复制按钮样式 */
.inspo-card-copy {
  width: 22px; height: 22px; border-radius: 5px;
  background: transparent; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  opacity: 0.6; transition: opacity .15s, background .15s;
  position: relative;
}
.inspo-card-copy svg { width: 12px; height: 12px; fill: #f59e0b; }
.inspo-card-copy:hover { background: rgba(245,158,11,.15); opacity: 1; }
.inspo-card-copy.copied svg { fill: rgba(74,222,128,.9); }
.inspo-card:hover .inspo-card-copy { opacity: 1; }
.inspo-card-copy::after {
  content: '复制';
  position: absolute;
  left: 26px;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.85);
  color: #fff;
  font-size: 10px;
  padding: 3px 7px;
  border-radius: 4px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity .15s;
  z-index: 10;
}
.inspo-card-copy:hover::after { opacity: 1; }
.inspo-card.out { animation: cardOut .2s ease forwards; }
@keyframes cardOut { to{opacity:0;transform:scale(.95);max-height:0;margin:0;padding:0;} }

.inspo-ft {
  padding: 9px 16px; border-top: 1px solid rgba(255,255,255,.06);
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.inspo-ft-info { font-size: 10px; color: rgba(255,255,255,.2); font-family: 'SF Mono', monospace; }
.inspo-exp-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 6px;
  background: rgba(245,158,11,.1); border: 1px solid rgba(245,158,11,.25);
  color: #fbbf24; font-size: 10px; cursor: pointer;
  transition: all .15s; font-family: inherit;
}
.inspo-exp-btn:hover { background: rgba(245,158,11,.18); }
.inspo-exp-btn svg { width: 10px; height: 10px; fill: currentColor; }

/* ══════════════════════════════════
   CALENDAR OVERLAY
══════════════════════════════════ */
#cal-overlay {
  position: absolute; inset: 0; z-index: 1200;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,.6);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  opacity: 0; pointer-events: none;
  transition: opacity .25s ease;
  overflow: hidden;
}
#cal-overlay.show { opacity: 1; pointer-events: all; }

#cal-panel {
  width: min(520px, 100%); max-height: 680px;
  background: rgba(12,12,24,0.97);
  border: 1px solid rgba(124,110,247,.18);
  border-radius: 20px;
  box-shadow: 0 40px 100px rgba(0,0,0,.8), inset 0 0 0 1px rgba(255,255,255,.04);
  display: flex; flex-direction: column; overflow: hidden;
  transform: scale(.88) translateY(20px);
  transition: transform .32s cubic-bezier(.34,1.1,.64,1);
}
#cal-overlay.show #cal-panel { transform: scale(1) translateY(0); }

/* cal header */
.cal-hd {
  padding: 16px 20px 14px; border-bottom: 1px solid rgba(255,255,255,.06);
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  background: linear-gradient(180deg,rgba(124,110,247,.05) 0%,transparent 100%);
}
.cal-hd-left { display: flex; align-items: center; gap: 11px; }
.cal-icon {
  width: 36px; height: 36px; border-radius: 11px;
  background: linear-gradient(145deg,var(--acc),var(--acc2));
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 14px rgba(124,110,247,.4); flex-shrink: 0;
}
.cal-icon svg { width: 17px; height: 17px; fill: #fff; }
.cal-title-wrap .cal-title { font-size: 16px; font-weight: 500; color: #fff; }
.cal-title-wrap .cal-sub   { font-size: 11px; color: rgba(255,255,255,.28); margin-top: 2px; }
.cal-hd-right { display: flex; align-items: center; gap: 8px; }

/* view switcher */
.cal-view-sw { display: flex; background: rgba(255,255,255,.06); border-radius: 8px; padding: 3px; gap: 2px; }
.cal-vbtn {
  padding: 4px 11px; border-radius: 6px; font-size: 11px; font-weight: 600;
  cursor: pointer; border: none; background: transparent;
  color: rgba(255,255,255,.4); transition: all .15s; font-family: inherit;
}
.cal-vbtn.on { background: rgba(124,110,247,.35); color: #a78bfa; }
.cal-vbtn:hover:not(.on) { color: rgba(255,255,255,.7); }

/* cat filter */
.cal-cat-sw { display: flex; gap: 5px; }
.cal-cat-btn {
  padding: 4px 10px; border-radius: 6px; font-size: 11px; cursor: pointer;
  background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1);
  color: rgba(255,255,255,.35); transition: all .15s; font-family: inherit; white-space: nowrap;
}
.cal-cat-btn.on-all  { background: rgba(168,139,250,.15); border-color: rgba(168,139,250,.35); color: #a78bfa; }
.cal-cat-btn.on-work { background: rgba(59,158,255,.15);  border-color: rgba(59,158,255,.35);  color: #3b9eff; }
.cal-cat-btn.on-self { background: rgba(249,115,22,.15);  border-color: rgba(249,115,22,.35);  color: #f97316; }

.cal-close {
  width: 28px; height: 28px; border-radius: 7px;
  background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
  color: rgba(255,255,255,.45); cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all .15s;
}
.cal-close:hover { background: rgba(255,255,255,.12); color: #fff; }
.cal-close svg { width: 12px; height: 12px; fill: currentColor; }

/* nav bar */
.cal-nav {
  padding: 10px 20px; border-bottom: 1px solid rgba(255,255,255,.06);
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.cal-nav-title { font-size: 14px; font-weight: 500; color: #fff; }
.cal-nav-btns  { display: flex; gap: 4px; }
.cal-nav-btn {
  width: 28px; height: 28px; border-radius: 7px;
  background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.08);
  color: rgba(255,255,255,.55); cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all .15s;
}
.cal-nav-btn:hover { background: rgba(255,255,255,.12); color: #fff; }
.cal-nav-btn svg { width: 14px; height: 14px; fill: currentColor; }
.cal-today-btn {
  padding: 4px 10px; border-radius: 7px; font-size: 11px; font-weight: 600;
  background: rgba(124,110,247,.18); border: 1px solid rgba(124,110,247,.3);
  color: #a78bfa; cursor: pointer; transition: all .15s; font-family: inherit;
}
.cal-today-btn:hover { background: rgba(124,110,247,.28); }

/* calendar body */
.cal-body { overflow-y: auto; flex: 1; padding: 0; }
.cal-body::-webkit-scrollbar { width: 3px; }
.cal-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 2px; }

/* ── Month view ── */
.month-grid { padding: 12px 16px 16px; }
.month-dow {
  display: grid; grid-template-columns: repeat(7,1fr);
  margin-bottom: 6px;
}
.month-dow span {
  text-align: center; font-size: 10px; font-weight: 600; letter-spacing: 1px;
  color: rgba(255,255,255,.25); padding: 4px 0;
}
.month-cells { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
.month-cell {
  min-height: 64px; border-radius: 8px; padding: 5px 6px;
  background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.05);
  cursor: default; transition: background .12s;
  display: flex; flex-direction: column;
}
.month-cell.other-month { opacity: .35; }
.month-cell.today { border-color: rgba(124,110,247,.45); background: rgba(124,110,247,.08); }
.month-cell-num {
  font-size: 11px; font-weight: 600; color: rgba(255,255,255,.5); margin-bottom: 3px; line-height: 1;
}
.month-cell.today .month-cell-num { color: #a78bfa; }
.month-cell-chips { display: flex; flex-direction: column; gap: 1px; flex: 1; overflow: hidden; }
.month-cell-more { font-size: 9px; color: rgba(255,255,255,.3); margin-top: 2px; }
.month-mini-chip {
  display: flex; align-items: center; gap: 3px;
  padding: 1px 4px; border-radius: 3px; line-height: 1.3;
  overflow: hidden; cursor: default;
}
.month-mini-chip.work { background: rgba(59,158,255,.18); }
.month-mini-chip.self { background: rgba(249,115,22,.18); }
.month-mini-chip.migrated { background: rgba(255,80,80,.18); }
.month-mini-chip.done { opacity: .45; }
.month-mini-dot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }
.month-mini-chip.work .month-mini-dot { background: #3b9eff; }
.month-mini-chip.self .month-mini-dot { background: #f97316; }
.month-mini-chip.migrated .month-mini-dot { background: #ff5555; }
.month-mini-txt { color: rgba(255,255,255,.75); overflow: hidden; text-overflow: ellipsis; flex: 1; font-size: 9px; }
.month-mini-chip.done .month-mini-txt { text-decoration: line-through; color: rgba(255,255,255,.3); }

/* ── Week view — vertical columns ── */
.week-wrap { padding: 12px 10px 14px; }
.week-cols { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
.week-col { display: flex; flex-direction: column; gap: 4px; }
.week-col-hd {
  background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.07);
  border-radius: 8px; padding: 5px 6px; text-align: center;
}
.week-col-dow { font-size: 10px; font-weight: 700; color: rgba(255,255,255,.35); letter-spacing: 1px; }
.week-col-date { font-size: 15px; font-weight: 300; color: rgba(255,255,255,.7); margin-top: 2px; line-height: 1; }
.week-col.is-today .week-col-hd { background: rgba(124,110,247,.18); border-color: rgba(124,110,247,.45); }
.week-col.is-today .week-col-dow { color: #a78bfa; }
.week-col.is-today .week-col-date { color: #a78bfa; font-weight: 600; }
.week-col-body {
  background: rgba(255,255,255,.02); border: 1px solid rgba(255,255,255,.05);
  border-radius: 8px; border-top: none; padding: 5px; flex: 1;
  display: flex; flex-direction: column; gap: 3px;
}
.week-col.is-today .week-col-body { border-color: rgba(124,110,247,.35); border-top: none; }
.wk-card {
  background: rgba(255,255,255,.06); border-radius: 6px; padding: 4px 5px;
  border-left: 2px solid rgba(255,255,255,.15); transition: transform .12s;
}
.wk-card:hover { transform: scale(1.01); }
.wk-card.work { background: rgba(59,158,255,.14); border-left-color: #3b9eff; }
.wk-card.self { background: rgba(249,115,22,.14); border-left-color: #f97316; }
.wk-card.migrated { background: rgba(255,80,80,.12); border-left-color: #ff5555; }
.wk-card.done { opacity: .45; }
.wk-card-time { font-size: 9px; color: rgba(255,255,255,.3); font-family: 'SF Mono', monospace; margin-bottom: 2px; }
.wk-card-txt { font-size: 10px; color: rgba(255,255,255,.8); line-height: 1.3; overflow: hidden; text-overflow: ellipsis; }
.wk-card.done .wk-card-txt { text-decoration: line-through; color: rgba(255,255,255,.3); }
.wk-card-migrate-tag { font-size: 9px; color: rgba(255,100,100,.6); margin-top: 2px; }
.wk-card-prog { font-size: 9px; font-family: 'SF Mono', monospace; margin-top: 2px; }
.wk-card.work .wk-card-prog { color: rgba(59,158,255,.6); }
.wk-card.self .wk-card-prog { color: rgba(249,115,22,.6); }
.wk-card.migrated .wk-card-prog { color: rgba(255,85,85,.6); }
.week-col-empty { font-size: 10px; color: rgba(255,255,255,.2); text-align: center; padding: 12px 0; }
.week-col-count { font-size: 9px; color: rgba(255,255,255,.25); text-align: center; padding: 4px 0; }

/* ── Day view with ring ── */
.day-wrap { padding: 0 16px 16px; }
.day-empty {
  padding: 40px 20px; text-align: center;
  color: rgba(255,255,255,.2); font-size: 13px;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.day-empty-icon { font-size: 30px; opacity: .3; }
.day-ring-row {
  display: flex; align-items: center; gap: 16px;
  padding: 16px 12px; margin-bottom: 12px;
  background: rgba(255,255,255,.03); border-radius: 12px;
  border: 1px solid rgba(255,255,255,.06);
}
.day-ring-svg { flex-shrink: 0; }
.day-ring-label { font-size: 10px; color: rgba(255,255,255,.35); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 3px; }
.day-ring-stat { font-size: 18px; font-weight: 400; color: #fff; }
.day-ring-stat span { color: rgba(255,255,255,.4); font-weight: 300; }
.day-section-hd {
  font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
  color: rgba(255,255,255,.22); padding: 12px 0 6px;
  display: flex; align-items: center; gap: 8px;
}
.day-section-hd::after { content: ''; flex: 1; height: 1px; background: var(--bdr); }
.day-card {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 12px; border-radius: 10px; margin-bottom: 5px;
  background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.06);
  transition: background .12s;
}
.day-card:hover { background: rgba(255,255,255,.07); }
.day-card.done { opacity: .7; }
.day-card.done-zero { border-left: 2px solid rgba(255,80,80,.4); }
.day-card.done-partial { border-left: 2px solid rgba(255,200,80,.35); }
.day-card.migrated { border-left: 2px solid rgba(255,80,80,.5); }
.day-card-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.day-card-dot.work { background: #3b9eff; box-shadow: 0 0 4px rgba(59,158,255,.5); }
.day-card-dot.self { background: #f97316; box-shadow: 0 0 4px rgba(249,115,22,.5); }
.day-card-dot.migrated { background: #ff5555; box-shadow: 0 0 4px rgba(255,85,85,.5); }
.day-card-main { flex: 1; min-width: 0; }
.day-card-txt { font-size: 13px; color: rgba(255,255,255,.85); line-height: 1.4; }
.day-card.done .day-card-txt { text-decoration: line-through; color: rgba(255,255,255,.35); }
.day-card-meta { display: flex; align-items: center; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
.day-card-time { font-size: 10px; color: rgba(255,255,255,.28); font-family: 'SF Mono', monospace; }
.day-card-migrate-badge { font-size: 9px; color: rgba(255,100,100,.85); background: rgba(255,80,80,.1); border: 1px solid rgba(255,80,80,.2); border-radius: 4px; padding: 1px 5px; }
.day-card-done-badge { font-size: 9px; border-radius: 4px; padding: 1px 5px; }
.day-card-done-badge.migrated-done { color: rgba(74,222,128,.85); background: rgba(74,222,128,.1); border: 1px solid rgba(74,222,128,.2); }
.day-card-done-badge.partial { color: rgba(255,200,80,.85); background: rgba(255,200,80,.1); border: 1px solid rgba(255,200,80,.2); }
.day-card-done-badge.zero { color: rgba(255,100,100,.85); background: rgba(255,80,80,.1); border: 1px solid rgba(255,80,80,.2); }
.day-card-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.day-card-cat { font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 600; }
.day-card-cat.work { background: rgba(59,158,255,.15); color: #3b9eff; }
.day-card-cat.self { background: rgba(249,115,22,.15); color: #f97316; }
.day-card-cat.migrated { background: rgba(255,85,85,.15); color: #ff5555; }
.day-card-prog { font-size: 10px; font-family: 'SF Mono', monospace; color: rgba(255,255,255,.28); }
.day-card-cat.work + .day-card-prog { color: rgba(59,158,255,.6); }
.day-card-cat.self + .day-card-prog { color: rgba(249,115,22,.6); }

/* cal footer */
.cal-ft {
  padding: 9px 16px; border-top: 1px solid rgba(255,255,255,.06);
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.cal-ft-info { font-size: 10px; color: rgba(255,255,255,.2); font-family: 'SF Mono', monospace; }
/* cal legend */
.cal-legend {
  padding: 8px 18px; border-top: 1px solid rgba(255,255,255,.06);
  display: flex; align-items: center; gap: 14px; flex-shrink: 0; flex-wrap: wrap;
}
.cal-legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: rgba(255,255,255,.35); }
.cal-legend-dot { width: 7px; height: 7px; border-radius: 50%; }
.cal-legend-dot.work     { background: #3b9eff; }
.cal-legend-dot.self     { background: #f97316; }
.cal-legend-dot.migrated { background: #ff5555; }
.cal-legend-dot.done     { background: #4ade80; }
/* ══════════════════════════════════
   SETTINGS OVERLAY
══════════════════════════════════ */
#settings-overlay {
  position: absolute; inset: 0; z-index: 1300;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,.55);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  opacity: 0; pointer-events: none;
  transition: opacity .22s ease;
  overflow: hidden;
}
#settings-overlay.show { opacity: 1; pointer-events: all; }

#settings-panel {
  width: 380px;
  background: rgba(12,12,24,0.97);
  border: 1px solid rgba(124,110,247,.16);
  border-radius: 20px;
  box-shadow: 0 40px 100px rgba(0,0,0,.8), inset 0 0 0 1px rgba(255,255,255,.04);
  display: flex; flex-direction: column; overflow: hidden;
  transform: scale(.88) translateY(16px);
  transition: transform .3s cubic-bezier(.34,1.1,.64,1);
}
#settings-overlay.show #settings-panel { transform: scale(1) translateY(0); }

.set-hd {
  padding: 18px 20px 14px; border-bottom: 1px solid var(--bdr);
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  background: linear-gradient(180deg,rgba(124,110,247,.05) 0%,transparent 100%);
}
.set-hd-left { display: flex; align-items: center; gap: 11px; }
.set-icon {
  width: 36px; height: 36px; border-radius: 11px;
  background: linear-gradient(145deg,var(--acc),var(--acc2));
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 14px rgba(124,110,247,.4); flex-shrink: 0;
}
.set-icon svg { width: 17px; height: 17px; fill: #fff; }
.set-title { font-size: 16px; font-weight: 500; color: var(--text); }
.set-close {
  width: 28px; height: 28px; border-radius: 7px;
  background: var(--card); border: 1px solid var(--bdr);
  color: var(--mute); cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all .15s;
}
.set-close:hover { background: rgba(255,255,255,.12); color: var(--text); }
.set-close svg { width: 12px; height: 12px; fill: currentColor; }

.set-body { padding: 8px 0 4px; overflow-y: auto; }
.set-body::-webkit-scrollbar { width: 3px; }
.set-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 2px; }

.set-section-hd {
  font-size: 10px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--mute); padding: 12px 20px 6px;
}
.set-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 20px; transition: background .12s;
}
.set-row:hover { background: var(--card); }
.set-row-left { display: flex; flex-direction: column; gap: 2px; }
.set-row-label { font-size: 13px; color: var(--text); }
.set-row-desc  { font-size: 11px; color: var(--mute); }

/* toggle switch */
.toggle-switch {
  position: relative; display: inline-block;
  width: 40px; height: 22px; flex-shrink: 0;
}
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute; inset: 0; cursor: pointer;
  background: rgba(255,255,255,.15); border-radius: 22px;
  transition: background .2s;
}
.toggle-slider::before {
  content: ''; position: absolute; height: 16px; width: 16px; left: 3px; bottom: 3px;
  background: #fff; border-radius: 50%; transition: transform .2s;
}
.toggle-switch input:checked + .toggle-slider { background: var(--violet); }
.toggle-switch input:checked + .toggle-slider::before { transform: translateX(18px); }

.toggle {
  position: relative; width: 40px; height: 22px; flex-shrink: 0;
}
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-track {
  position: absolute; inset: 0; cursor: pointer;
  background: rgba(255,255,255,.12); border-radius: 11px;
  transition: background .2s;
}
.toggle input:checked + .toggle-track { background: var(--acc); }
.toggle-track::after {
  content: ''; position: absolute; left: 3px; top: 3px;
  width: 16px; height: 16px; border-radius: 50%;
  background: #fff; transition: transform .2s cubic-bezier(.34,1.2,.64,1);
  box-shadow: 0 1px 4px rgba(0,0,0,.3);
}
.toggle input:checked + .toggle-track::after { transform: translateX(18px); }

/* theme picker */
.theme-picker { display: flex; gap: 8px; }
.theme-opt {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  cursor: pointer; padding: 8px 10px; border-radius: 10px;
  border: 1.5px solid var(--bdr); transition: all .15s; flex: 1;
}
.theme-opt:hover { border-color: rgba(124,110,247,.4); background: rgba(124,110,247,.06); }
.theme-opt.active { border-color: var(--acc); background: rgba(124,110,247,.12); }
.theme-preview {
  width: 48px; height: 32px; border-radius: 7px;
  border: 1px solid rgba(255,255,255,.1);
}
.theme-preview.dark { background: linear-gradient(135deg,#0d0d20,#1a1a35); }
.theme-preview.light {
  background: linear-gradient(135deg,#f0f0f8,#e8e8f5);
  border-color: rgba(0,0,0,.12);
}
.theme-label { font-size: 11px; font-weight: 600; color: var(--mute); }
.theme-opt.active .theme-label { color: #a78bfa; }

/* shortcut display */
.set-kbd {
  display: inline-flex; align-items: center; gap: 3px;
}
.kbd {
  padding: 2px 6px; border-radius: 4px; font-size: 10px;
  font-family: 'SF Mono', monospace; font-weight: 600;
  background: var(--card); border: 1px solid var(--bdr);
  color: var(--mute);
}

/* divider */
.set-divider {
  height: 1px; background: var(--bdr); margin: 4px 20px;
}
body.light .set-hd   { border-color: rgba(0,0,0,0.07); }
body.light .set-title { color: rgba(20,20,40,0.9); }
body.light .set-close { background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.1); color: rgba(20,20,40,.4); }
body.light .set-close:hover { background: rgba(0,0,0,.1); color: rgba(20,20,40,.85); }
body.light .set-section-hd { color: rgba(20,20,40,.35); }
body.light .set-row:hover  { background: rgba(0,0,0,.04); }
body.light .set-row-label  { color: rgba(20,20,40,.88); }
body.light .set-row-desc   { color: rgba(20,20,40,.4); }
body.light .toggle-track   { background: rgba(0,0,0,.15); }
body.light .theme-opt      { border-color: rgba(0,0,0,.09); }
body.light .kbd            { background: rgba(0,0,0,.05); border-color: rgba(0,0,0,.1); color: rgba(20,20,40,.4); }
body.light .set-divider    { background: rgba(0,0,0,.07); }

/* ── Shortcut recorder ── */
.sc-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 20px; transition: background .12s;
}
.sc-row:hover { background: rgba(255,255,255,.03); }
.sc-row-label { font-size: 12px; color: var(--text); }
.sc-row-desc  { font-size: 10px; color: var(--mute); margin-top: 2px; }
body.light .sc-row:hover { background: rgba(0,0,0,.03); }
body.light .sc-row-label { color: rgba(20,20,40,.88); }
body.light .sc-row-desc  { color: rgba(20,20,40,.4); }

.sc-record-btn {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 5px 10px; border-radius: 7px; cursor: pointer;
  background: var(--card); border: 1px solid var(--bdr);
  color: var(--mute); font-size: 11px; font-family: 'SF Mono', monospace;
  transition: all .15s; min-width: 90px; justify-content: center;
  user-select: none; flex-shrink: 0;
}
.sc-record-btn:hover { border-color: rgba(124,110,247,.4); color: #a78bfa; background: rgba(124,110,247,.08); }
.sc-record-btn.recording {
  border-color: rgba(124,110,247,.7); color: #a78bfa;
  background: rgba(124,110,247,.15);
  box-shadow: 0 0 12px rgba(124,110,247,.25);
  animation: sc-pulse 1s ease infinite;
}
@keyframes sc-pulse { 50% { box-shadow: 0 0 16px rgba(124,110,247,.4); } }
body.light .sc-record-btn { background: rgba(0,0,0,.05); border-color: rgba(0,0,0,.1); color: rgba(20,20,40,.5); }
body.light .sc-record-btn:hover { border-color: rgba(124,110,247,.5); color: #7c6ef7; background: rgba(124,110,247,.06); }
body.light .sc-record-btn.recording { border-color: rgba(124,110,247,.7); color: #7c6ef7; background: rgba(124,110,247,.12); }

.sc-reset-btn {
  background: none; border: none; cursor: pointer;
  color: var(--mute); font-size: 10px; padding: 2px 6px;
  border-radius: 4px; transition: all .12s; margin-left: 6px;
  font-family: inherit; flex-shrink: 0;
}
.sc-reset-btn:hover { color: var(--red); background: rgba(255,77,109,.1); }
body.light .sc-reset-btn { color: rgba(20,20,40,.35); }
body.light .sc-reset-btn:hover { color: var(--red); background: rgba(255,77,109,.08); }
/* MIT light theme */
body.light #mit-wrap { background: linear-gradient(135deg,rgba(245,158,11,.09),rgba(249,115,22,.06)); border-color: rgba(245,158,11,.3); }
body.light #mit-input { color: rgba(20,20,40,.88); }
body.light #mit-input::placeholder { color: rgba(20,20,40,.28); }
body.light .mit-label { color: rgba(200,120,0,.85); }
body.light .mit-label svg { fill: rgba(200,120,0,.85); }
body.light .mit-edit-inp { color: rgba(20,20,40,.88); background: rgba(124,110,247,.06); border-color: rgba(124,110,247,.45); }
body.light .mit-hint { color: rgba(20,20,40,.25); }
body.light .mit-tab-btn { background: rgba(0,0,0,.05); border-color: rgba(0,0,0,.1); color: rgba(20,20,40,.35); }

/* ft-collapsed: hide panel content when icon-only window is shown */
body.ft-collapsed #panel {
  display: none !important;
}
</style>
</head>

            style="width:56px; padding:4px 8px; border-radius:8px; border:1px solid rgba(124,110,247,.3); background:var(--card); color:var(--text); font-size:13px; text-align:center;">
        </div>

        <!-- 任务标签子开关 -->
        <div class="set-row" style="padding-left:36px">
          <div>
            <div class="set-row-label" style="font-size:12px">全部</div>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="tog-mitShowAll" onchange="cfg.showTabAll=this.checked; saveCfg(); applySettings();">
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="set-row" style="padding-left:36px">
          <div>
            <div class="set-row-label" style="font-size:12px">工作</div>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="tog-mitShowWork" onchange="cfg.showTabWork=this.checked; saveCfg(); applySettings();">
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="set-row" style="padding-left:36px">
          <div>
            <div class="set-row-label" style="font-size:12px">个人</div>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="tog-mitShowSelf" onchange="cfg.showTabSelf=this.checked; saveCfg(); applySettings();">
            <span class="toggle-slider"></span>
          </label>
        </div>

      </div>
    </div>
  </div>

</div><!-- #app -->

<script>
'use strict';

// ── DOM ───────────────────────────────────────────────────────
const fab     = document.getElementById('fab');
const panel   = document.getElementById('panel');
const badge   = document.getElementById('badge');
const inpRow  = document.getElementById('inp-row');
const inp     = document.getElementById('inp');
const addBtn  = document.getElementById('add-btn');
const list    = document.getElementById('list');
const empty   = document.getElementById('empty');
const emptyTx = document.getElementById('empty-txt');
const hdCount = document.getElementById('hd-count');
const ftInfo  = document.getElementById('ft-info');
const clrBtn  = document.getElementById('clr-btn');
const expBtn  = document.getElementById('exp-btn');
const autoBtn = document.getElementById('auto-btn');
const aBadge  = document.getElementById('ab');
const wBadge  = document.getElementById('wb');
const sBadge  = document.getElementById('sb');
const sWork   = document.getElementById('s-work');
const sSelf   = document.getElementById('s-self');
const sDone   = document.getElementById('s-done');
const toggleDoneBtn = document.getElementById('toggle-done-btn');

// ── hideDone toggle ──
function toggleHideDone() { hideDone = !hideDone; render(); }
toggleDoneBtn.addEventListener('click', toggleHideDone);

const inspoOpenBtn  = document.getElementById('inspo-open-btn');
const inspoOverlay  = document.getElementById('inspo-overlay');
const inspoCloseBtn = document.getElementById('inspo-close-btn');
const inspoTextarea = document.getElementById('inspo-textarea');
const inspoSaveBtn  = document.getElementById('inspo-save-btn');
const inspoSearch   = document.getElementById('inspo-search');
const inspoList     = document.getElementById('inspo-list');
const inspoEmpty    = document.getElementById('inspo-empty');
const inspoFtInfo   = document.getElementById('inspo-ft-info');
const inspoExpBtn   = document.getElementById('inspo-exp-btn');
const inspoSub      = document.getElementById('inspo-sub');

// ── State ─────────────────────────────────────────────────────
let todos  = JSON.parse(localStorage.getItem('ft2')    || '[]');
let inspos = JSON.parse(localStorage.getItem('ft-ins') || '[]');
// Add demo tasks if empty
if (todos.length === 0) {
  todos = [
    { text: '已完成的任务示例', done: true,  cat: 'work', ts: Date.now() - 86400000 },
    { text: '待办的工作任务',   done: false, cat: 'work', ts: Date.now() },
    { text: '待办的自定义任务', done: false, cat: 'self', ts: Date.now() + 3600000 },
    { text: '带进度的任务 75%', done: false, cat: 'work', ts: Date.now(), progress: 75 },
    { text: '带进度的任务 30%', done: false, cat: 'self', ts: Date.now(), progress: 30 },
  ];
}
let tab       = 'all';
let mitTodos  = JSON.parse(localStorage.getItem('ft-mit-tasks') || '[]'); // MIT 专属任务，独立于下方标签列表
let open      = false;   // panel starts hidden by default
let activeTag = 'idea';
let filterTag = 'all';
let hideDone  = false; // 打开面板时自动隐藏已完成

// ── Settings (loaded early so shortcut functions can reference cfg) ──
const SETTINGS_KEY = 'ft-settings';
const defaultSettings = {
  theme:          'dark',
  showMit:        true,
  showTabAll:     true,
  showTabWork:    true,
  showTabSelf:    true,
  doneDays:       0,     // 已完成统计范围：0=全部，N=最近N天
  shortcuts: {
    togglePanel:  null,
    toggleInspo:  null,
  },
};
let cfg = JSON.parse(localStorage.getItem(SETTINGS_KEY) || 'null');
if (cfg) {
  // deep-merge with defaults to handle missing fields from old versions
  function deepMerge(target, source) {
    for (const k of Object.keys(source)) {
      if (source[k] && typeof source[k] === 'object' && !Array.isArray(source[k]) && target[k]) {
        deepMerge(target[k], source[k]);
      } else if (!(k in target)) {
        target[k] = JSON.parse(JSON.stringify(source[k]));
      }
    }
    return target;
  }
  cfg = deepMerge(cfg, defaultSettings);
} else {
  cfg = JSON.parse(JSON.stringify(defaultSettings));
}
// Remove legacy shortcuts that are now always hardcoded (Enter)
if (cfg.shortcuts) {
  delete cfg.shortcuts.addTodo;
  delete cfg.shortcuts.saveInspo;
}
function saveCfg() { localStorage.setItem(SETTINGS_KEY, JSON.stringify(cfg)); }

// ── Mouse passthrough (Electron only) ─────────────────────────
function syncCollapsedLayout() {
  document.body.classList.toggle('ft-collapsed', !open);
}
function syncMousePassthrough() {
  if (!window.api) return;
  if (dragging) {
    window.api.setIgnoreMouse(false);
    return;
  }
  const overlayOpen = inspoOverlay.classList.contains('show')
    || calOverlay.classList.contains('show')
    || settingsOverlay.classList.contains('show');
  const overFab = fab.matches(':hover');
  const interactive = open || overlayOpen || overFab;
  window.api.setIgnoreMouse(!interactive);
}
function enterUI() { syncMousePassthrough(); }
function leaveUI() {
  if (dragging) return;
  syncMousePassthrough();
}
fab.addEventListener('mouseenter', enterUI);
fab.addEventListener('mouseleave', leaveUI);
panel.addEventListener('mouseenter', enterUI);
panel.addEventListener('mouseleave', leaveUI);
inspoOverlay.addEventListener('mouseenter', enterUI);
inspoOverlay.addEventListener('mouseleave', leaveUI);

// ── Drag (Electron: uses IPC to get real window pos) ──────────
let dragging=false, downT=0, downSX=0, downSY=0, winX=0, winY=0, dragPointerId=null;
function setPanelOpenState(isOpen) {
  open = isOpen;
  syncCollapsedLayout();
  if (isOpen) {
    panel.classList.remove('hide');
    hideDone = true;
    render();
    if (tab !== 'all') setTimeout(() => inp.focus(), 40);
  } else {
    panel.classList.add('hide');
  }
  syncMousePassthrough();
}
setTimeout(() => { syncCollapsedLayout(); syncMousePassthrough(); }, 0);

fab.addEventListener('pointerdown', e => {
  if (e.button!==0) return; e.preventDefault();
  if (window.api) window.api.setIgnoreMouse(false);
  dragPointerId = e.pointerId;
  if (fab.setPointerCapture) {
    try { fab.setPointerCapture(dragPointerId); } catch (_) {}
  }
  dragging=false; downT=Date.now(); downSX=e.screenX; downSY=e.screenY;
  if (window.__ftGetDragBase) {
    const b = window.__ftGetDragBase();
    winX = b.x; winY = b.y;
  } else {
    winX = window.screenX; winY = window.screenY;
  }
  if (window.api && window.api.getWinPos) {
    window.api.getWinPos().then(p => {
      if (dragging) return;
      if (p && typeof p.x === 'number' && typeof p.y === 'number') {
        winX = p.x; winY = p.y;
      }
    }).catch(() => {});
  }

  const moveWindow = (x, y) => {
    if (window.api && window.api.moveWin) {
      try { window.api.moveWin(x, y); return; } catch (_) {}
    }
    if (window.moveTo) window.moveTo(x, y);
  };
  let nextX = winX, nextY = winY, raf = 0;
  const flush = () => {
    raf = 0;
    moveWindow(nextX, nextY);
  };

  const finishDrag=()=>{
    if (raf) {
      cancelAnimationFrame(raf);
      raf = 0;
    }
    if (window.api && window.api.moveWinEnd) window.api.moveWinEnd();
    fab.removeEventListener('pointermove',onMove,true);
    fab.removeEventListener('pointerup',onUp,true);
    fab.removeEventListener('pointercancel',onCancel,true);
    fab.removeEventListener('lostpointercapture',onCancel,true);
    if (dragPointerId !== null && fab.releasePointerCapture) {
      try { if (fab.hasPointerCapture && fab.hasPointerCapture(dragPointerId)) fab.releasePointerCapture(dragPointerId); } catch (_) {}
    }
    dragPointerId = null;
    fab.classList.remove('dragging');
    setTimeout(()=>{dragging=false; syncMousePassthrough();},50);
  };
  const onMove=ev=>{
    if (dragPointerId !== null && ev.pointerId !== dragPointerId) return;
    const dx=ev.screenX-downSX, dy=ev.screenY-downSY;
    if (!dragging&&(Math.abs(dx)>4||Math.abs(dy)>4)){
      dragging=true;fab.classList.add('dragging');
    }
    if (dragging) {
      nextX = winX + dx; nextY = winY + dy;
      if (!raf) raf = requestAnimationFrame(flush);
    }
  };
  const onUp=ev=>{
    if (dragPointerId !== null && ev.pointerId !== dragPointerId) return;
    finishDrag();
  };
  const onCancel=()=>finishDrag();
  fab.addEventListener('pointermove',onMove,{capture:true, once:false});
  fab.addEventListener('pointerup',onUp,{capture:true, once:true});
  fab.addEventListener('pointercancel',onCancel,{capture:true, once:true});
  fab.addEventListener('lostpointercapture',onCancel,{capture:true, once:true});
});
fab.addEventListener('click',()=>{
  if (dragging) return;
  if (Date.now()-downT>500) return;
  setPanelOpenState(!open);
});
document.addEventListener('mousedown',e=>{
  if (open&&!panel.contains(e.target)&&!fab.contains(e.target)&&!inspoOverlay.contains(e.target)){
    setPanelOpenState(false);
  }
});

// ── Tabs ──────────────────────────────────────────────────────
function switchTab(t){
  if (t !== 'all') {
    const btn = document.getElementById('tab-' + t);
    if (btn && btn.classList.contains('mit-disabled')) return;
  }
  tab=t;
  ['all','work','self'].forEach(x=>document.getElementById('tab-'+x).classList.toggle('on',x===t));
  if(t==='all'){
    inpRow.style.display='none'; emptyTx.textContent='暂无任务';
  } else {
    inpRow.style.display='flex';
    inp.className='inp '+t;
    inp.placeholder=t==='work'?'添加工作任务...':'添加个人任务...';
    addBtn.className='add-btn '+t;
    emptyTx.textContent=t==='work'?'暂无工作任务':'暂无个人任务';
    setTimeout(()=>inp.focus(),40);
  }
  render();
}

// ── Auto-launch ───────────────────────────────────────────────
let autoOn=false;
async function initAutoLaunch(){
  if(!window.api){autoBtn.textContent='开机自启: 已关闭';return;}
  autoOn=await window.api.getAutoLaunch(); renderAutoBtn();
}
function renderAutoBtn(){
  autoBtn.textContent='开机自启: '+(autoOn?'已开启':'已关闭');
  autoBtn.classList.toggle('active',autoOn);
}
autoBtn.addEventListener('click',()=>{
  autoOn=!autoOn; renderAutoBtn();
  if(window.api) window.api.setAutoLaunch(autoOn);
});
initAutoLaunch();

// ── Export todos ──────────────────────────────────────────────
expBtn.addEventListener('click',()=>{
  dl(JSON.stringify({exportedAt:new Date().toISOString(),total:todos.length,todos},null,2),
     'floatingtodo-'+ds()+'.json','application/json');
});

// ── Todo data ─────────────────────────────────────────────────
function saveTodos(){localStorage.setItem('ft2',JSON.stringify(todos));}
function fmtT(iso){if(!iso)return'';const d=new Date(iso);return pad(d.getHours())+':'+pad(d.getMinutes());}
function fmtG(iso){
  if(!iso)return'今天';
  const d=new Date(iso);d.setHours(0,0,0,0);
  const n=new Date();n.setHours(0,0,0,0);
  const df=Math.round((n-d)/86400000);
  if(df===0)return'今天'; if(df===1)return'昨天'; if(df<=7)return df+' 天前';
  return(d.getMonth()+1)+'月'+d.getDate()+'日';
}

// ── MIT: Most Important Task ────────────────────────────────────
function mitAutoHeight(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,120)+'px';
}
function mitInputClear(){
  document.getElementById('mit-input').value='';
  document.getElementById('mit-input').style.height='auto';
}
function renderMitTasks(){
  const container = document.getElementById('mit-tasks');
  if (!container) return;
  if (mitTodos.length === 0) { container.innerHTML = ''; return; }
  container.innerHTML = mitTodos.map((t, idx) => `
    <div class="mit-task-item${t.done ? ' done' : ''}" data-id="${t.id}">
      <div class="mit-task-check${t.done ? ' done' : ''}" onclick="mitToggleTask(${t.id})"></div>
      <div class="mit-task-text" ondblclick="mitEditTask(${t.id}, this)">${escHtml(t.text)}</div>
      <div class="mit-task-del" onclick="mitDeleteTask(${t.id})">✕</div>
    </div>
  `).join('');
}
function mitToggleTask(id){
  const t = mitTodos.find(t => t.id === id);
  if (!t) return;
  t.done = !t.done;
  localStorage.setItem('ft-mit-tasks', JSON.stringify(mitTodos));
  renderMitTasks();
}
function mitEditTask(id, txtEl){
  const t = mitTodos.find(t => t.id === id);
  if (!t || t.done) return;
  const inp = document.createElement('input');
  inp.type = 'text'; inp.className = 'mit-edit-inp';
  inp.value = t.text;
  txtEl.replaceWith(inp); inp.focus(); inp.select();
  const finish = () => {
    const v = inp.value.trim();
    if (v && v !== t.text) { t.text = v; localStorage.setItem('ft-mit-tasks', JSON.stringify(mitTodos)); }
    renderMitTasks();
  };
  inp.addEventListener('blur', finish);
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') inp.blur(); if (e.key === 'Escape') inp.blur(); });
}
function mitDeleteTask(id){
  mitTodos = mitTodos.filter(t => t.id !== id);
  localStorage.setItem('ft-mit-tasks', JSON.stringify(mitTodos));
  renderMitTasks();
}
function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
(function(){
  const inp=document.getElementById('mit-input');
  inp.addEventListener('input',()=>{
    mitAutoHeight(inp);
    localStorage.setItem('ft-mit',inp.value);
  });
  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter'&&!e.ctrlKey&&!e.shiftKey){
      e.preventDefault();
      const text = inp.value.trim();
      if (!text) return;
      mitTodos.unshift({ id: Date.now(), text, done: false, created: new Date().toISOString() });
      localStorage.setItem('ft-mit-tasks', JSON.stringify(mitTodos));
      inp.value = '';
      inp.style.height = 'auto';
      renderMitTasks();
    }
  });
  mitAutoHeight(inp);
})();

// ── Migration: run once per day at startup ─────────────────────
function runMigration(){
  const LAST_KEY = 'ft-last-migrate';
  const todayStr = new Date().toISOString().slice(0,10);
  if(localStorage.getItem(LAST_KEY) === todayStr) return; // already ran today

  const todayStart = new Date(); todayStart.setHours(0,0,0,0);
  let changed = false;
  const toAdd = [];

  todos.forEach((t, i) => {
    if(t.done) return;
    if(!t.createdAt) return;
    const taskDay = new Date(t.createdAt); taskDay.setHours(0,0,0,0);
    if(taskDay >= todayStart) return; // today's task, skip

    const prog = t.progress || 0;

    // Mark original as done
    todos[i] = {
      ...t,
      done: true,
      doneAt: new Date(todayStart.getTime() - 1000).toISOString(),
      doneType: prog === 0 ? 'zero' : 'partial',
    };

    // Create migrated copy for today
    toAdd.push({
      text: t.text,
      cat: t.cat,
      done: false,
      progress: prog,
      createdAt: todayStart.toISOString(),
      doneAt: null,
      migratedFrom: t.createdAt,
    });
    changed = true;
  });

  if(changed){
    todos = [...toAdd, ...todos];
    saveTodos();
  }
  localStorage.setItem(LAST_KEY, todayStr);
}

function render(){
  [...list.querySelectorAll('.item,.grp-hd')].forEach(el=>el.remove());
  const aw=todos.filter(t=>t.cat==='work'), as=todos.filter(t=>t.cat==='self');
  // 按 doneDays 过滤已完成的辅助函数
  function doneInRange(list) {
    if (cfg.doneDays <= 0) return list.filter(t=>t.done);
    return list.filter(t => {
      if (!t.done || !t.doneAt) return false;
      const daysDiff = (Date.now() - new Date(t.doneAt).getTime()) / 86400000;
      return daysDiff <= cfg.doneDays;
    });
  }
  // 三个卡片都按 doneDays 过滤
  sWork.textContent=doneInRange(aw).length;
  sSelf.textContent=doneInRange(as).length;
  sDone.textContent=doneInRange(todos).length;
  const wp=aw.filter(t=>!t.done).length, sp=as.filter(t=>!t.done).length, ap=wp+sp;
  aBadge.textContent=ap; aBadge.classList.toggle('zero',ap===0);
  wBadge.textContent=wp; wBadge.classList.toggle('zero',wp===0);
  sBadge.textContent=sp; sBadge.classList.toggle('zero',sp===0);
  badge.textContent=ap>99?'99+':ap; badge.classList.toggle('hide',ap===0);
  if(todos.length===0)  hdCount.innerHTML='暂无任务';
  else if(ap===0)       hdCount.innerHTML='全部完成 🎉';
  else hdCount.innerHTML=(wp?'<b class="w">'+wp+'</b> 工作 ':'')+
                          (sp?'<b class="s">'+sp+'</b> 个人':'');
  const cur=tab==='all'?todos.slice():todos.filter(t=>t.cat===tab);
  const cp=cur.filter(t=>!t.done).length, cd=cur.filter(t=>t.done).length;
  const displayTodos = hideDone ? cur.filter(t=>!t.done) : cur;
  ftInfo.textContent=cp+' 项待办 · '+cd+' 项已完成';
  toggleDoneBtn.style.display = cd > 0 ? '' : 'none';
  toggleDoneBtn.textContent = hideDone ? '展开已完成' : '收起已完成';
  empty.classList.toggle('show',displayTodos.length===0);
  if(!displayTodos.length) return;
  const g={};
  displayTodos.forEach(t=>{const k=t.createdAt?t.createdAt.slice(0,10):'today';if(!g[k])g[k]=[];g[k].push(t);});
  Object.keys(g).sort((a,b)=>b.localeCompare(a)).forEach(key=>{
    const ghd=document.createElement('div'); ghd.className='grp-hd'; ghd.textContent=fmtG(g[key][0].createdAt); list.appendChild(ghd);
    // 按 order 字段排序（未完成在前，已完成在后；同组内按 order 排）
    g[key].sort((a,b)=>{
      if(a.done !== b.done) return a.done ? 1 : -1;
      const oa = (a.order !== undefined) ? a.order : 999999;
      const ob = (b.order !== undefined) ? b.order : 999999;
      return oa - ob;
    });
    g[key].forEach(todo=>{
      const i=todos.indexOf(todo), cat=todo.cat||'work';
      const isMigrated=!!todo.migratedFrom;
      const doneType=todo.doneType||''; // 'zero'|'partial'|''
      const hasProgress = todo.progress !== undefined && todo.progress < 100;
      let cls='item '+(cat==='work'?'work-i':'self-i');
      if(todo.done){
        cls+=' done';
        if(doneType==='partial') cls+=' done-partial';
        else if(doneType==='zero') cls+=' done-zero';
      }
      if(isMigrated) cls+=' migrated';
      const el=document.createElement('div');
      el.className=cls+(hasProgress?' has-progress':'');
      el.dataset.todoId = todo.createdAt; // 用createdAt作为唯一标识
      const progHtml = todo.done ? '' :
        (todo.progress !== undefined ? '<span class="item-progress">'+(todo.progress>=100?'✓':todo.progress+'%')+'</span>' : '<span class="item-progress">%</span>');
      // 只有未完成任务显示拖拽手柄
      const dragHandleHtml = todo.done ? '' : '<div class="drag-handle" title="拖拽排序">⠿</div>';
      el.innerHTML=dragHandleHtml+
        '<div class="dot '+cat+'"></div>'+
        '<div class="chk"><svg viewBox="0 0 24 24" fill="#fff"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div>'+
        '<span class="txt">'+esc(todo.text)+'</span>'+
        progHtml+
        '<span class="item-time">'+fmtT(todo.createdAt)+'</span>'+
        '<button class="del"><svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></button>';
      // 拖拽排序：仅对未完成任务启用
      if (!todo.done) {
        const handle = el.querySelector('.drag-handle');
        handle.addEventListener('mousedown', () => { el.draggable = true; });
        handle.addEventListener('mouseup',   () => { el.draggable = false; });
        el.addEventListener('dragstart', (e) => {
          e.dataTransfer.effectAllowed = 'move';
          e.dataTransfer.setData('text/plain', todo.createdAt);
          el.classList.add('dragging');
          // 延迟设回，避免拖拽时立即触发dragend
          setTimeout(() => el.classList.add('dragging'), 0);
        });
        el.addEventListener('dragend', () => {
          el.draggable = false;
          el.classList.remove('dragging');
          document.querySelectorAll('.item').forEach(it => {
            it.classList.remove('drag-over-top', 'drag-over-bottom');
          });
        });
        el.addEventListener('dragover', (e) => {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          const rect = el.getBoundingClientRect();
          const mid  = rect.top + rect.height / 2;
          document.querySelectorAll('.item').forEach(it => it.classList.remove('drag-over-top','drag-over-bottom'));
          el.classList.add(e.clientY < mid ? 'drag-over-top' : 'drag-over-bottom');
        });
        el.addEventListener('dragleave', () => {
          el.classList.remove('drag-over-top', 'drag-over-bottom');
        });
        el.addEventListener('drop', (e) => {
          e.preventDefault();
          el.classList.remove('drag-over-top', 'drag-over-bottom');
          const srcId  = e.dataTransfer.getData('text/plain');
          const tgtId  = todo.createdAt;
          if (srcId === tgtId) return;
          const srcIdx = todos.findIndex(t => t.createdAt === srcId);
          const tgtIdx = todos.findIndex(t => t.createdAt === tgtId);
          if (srcIdx === -1 || tgtIdx === -1) return;
          // 取出同日期同未完成状态的列表，重新排列
          const dateKey = todos[tgtIdx].createdAt ? todos[tgtIdx].createdAt.slice(0,10) : 'today';
          const sameGroup = todos.filter(t => !t.done && t.createdAt && t.createdAt.slice(0,10) === dateKey);
          // 给 sameGroup 排序：先按当前 order，确定位置
          sameGroup.sort((a,b) => {
            const oa = (a.order !== undefined) ? a.order : 999999;
            const ob = (b.order !== undefined) ? b.order : 999999;
            return oa - ob;
          });
          const srcPos  = sameGroup.findIndex(t => t.createdAt === srcId);
          const tgtPos  = sameGroup.findIndex(t => t.createdAt === tgtId);
          if (srcPos === -1 || tgtPos === -1) return;
          // 取出src，插入到tgt位置（判断上/下半区）
          const rect = el.getBoundingClientRect();
          const insertAfter = e.clientY >= rect.top + rect.height / 2;
          sameGroup.splice(srcPos, 1);
          const newPos = sameGroup.findIndex(t => t.createdAt === tgtId);
          sameGroup.splice(insertAfter ? newPos + 1 : newPos, 0, todos[srcIdx]);
          // 重写 order
          sameGroup.forEach((t, idx) => {
            const ti = todos.findIndex(x => x.createdAt === t.createdAt);
            if (ti !== -1) todos[ti].order = idx;
          });
          saveTodos();
          render();
        });
      }
      el.querySelector('.chk').addEventListener('click',()=>{
        if(!todo.done){
          todos[i].done=true;
          todos[i].progress=100;
          todos[i].doneAt=new Date().toISOString();
          todos[i].doneType='';
        } else {
          todos[i].done=false;
          todos[i].doneAt=null;
          todos[i].doneType='';
        }
        saveTodos();
        if (todos[i].done && hideDone) {
          hideDone = false;
          render();
          setTimeout(() => { hideDone = true; render(); }, 600);
        } else {
          render();
        }
      });
      el.querySelector('.del').addEventListener('click',()=>{el.classList.add('out');setTimeout(()=>{todos.splice(i,1);saveTodos();render();},200);});

      // 点击 % 或 N% 进入编辑进度
      const progEl = el.querySelector('.item-progress');
      if (progEl) {
        progEl.addEventListener('click', (ev) => {
          ev.stopPropagation();
          const inp = document.createElement('input');
          inp.type = 'number'; inp.className = 'prog-inp'; inp.min = 0; inp.max = 100;
          inp.value = todos[i].progress !== undefined ? todos[i].progress : '';
          inp.placeholder = '%';
          progEl.replaceWith(inp); inp.focus();
          const finish = () => {
            const val = parseInt(inp.value);
            if (isNaN(val) || val < 0 || val > 100) { render(); return; }
            if (val === 100) {
              todos[i].done = true;
              todos[i].doneAt = new Date().toISOString();
              todos[i].doneType = '';
              delete todos[i].progress;
            } else if (val > 0) {
              todos[i].progress = val;
              todos[i].done = false;
              todos[i].doneAt = null;
              todos[i].doneType = '';
            } else {
              delete todos[i].progress;
              todos[i].doneType = '';
            }
            saveTodos(); render();
          };
          inp.addEventListener('blur', finish);
          inp.addEventListener('keydown', e => { if (e.key === 'Enter') inp.blur(); if (e.key === 'Escape') { inp.value = ''; inp.blur(); } });
        });
      }

      // 双击编辑任务文本
      const txtEl = el.querySelector('.txt');
      txtEl.addEventListener('dblclick', () => {
        const inp2 = document.createElement('input');
        inp2.type = 'text'; inp2.className = 'edit-inp';
        inp2.value = todos[i].text;
        txtEl.replaceWith(inp2); inp2.focus(); inp2.select();
        const finish = () => {
          const v = inp2.value.trim();
          if (v && v !== todos[i].text) { todos[i].text = v; saveTodos(); }
          render();
        };
        inp2.addEventListener('blur', finish);
        inp2.addEventListener('keydown', e => { if (e.key === 'Enter') inp2.blur(); if (e.key === 'Escape') { inp2.value = todos[i].text; inp2.blur(); } });
      });

      list.appendChild(el);
    });
  });
}

function addTodo(){
  const text=inp.value.trim(); if(!text) return;
  const todayKey = new Date().toISOString().slice(0,10);
  // 给同日期未完成任务的order全部+1，新任务插到最前(order=0)
  todos.forEach(t => {
    if (!t.done && t.createdAt && t.createdAt.slice(0,10) === todayKey) {
      t.order = (t.order !== undefined ? t.order : 0) + 1;
    }
  });
  todos.unshift({text, done:false, cat:tab, createdAt:new Date().toISOString(), doneAt:null, order:0});
  saveTodos(); render(); inp.value='';
  badge.classList.add('pop'); setTimeout(()=>badge.classList.remove('pop'),300);
}

function fmtID(iso){
  if(!iso)return'';
  const d=new Date(iso);
  const n=new Date();n.setHours(0,0,0,0);
  const dd=new Date(iso);dd.setHours(0,0,0,0);
  const df=Math.round((n-dd)/86400000);
  const t=pad(d.getHours())+':'+pad(d.getMinutes());
  if(df===0)return'今天 '+t; if(df===1)return'昨天 '+t; if(df<=7)return df+' 天前';
  return(d.getMonth()+1)+'/'+d.getDate()+' '+t;
}

inspoList.addEventListener('wheel', (e) => {
  // 阻止事件冒泡，防止触发其他滚动行为
  e.stopPropagation();
  
  // 检查是否可以滚动
  const canScrollUp = inspoList.scrollTop > 0;
  const canScrollDown = inspoList.scrollTop < (inspoList.scrollHeight - inspoList.clientHeight);
  
  // 根据滚动方向和可滚动状态决定是否阻止默认行为
  if ((e.deltaY < 0 && canScrollUp) || (e.deltaY > 0 && canScrollDown)) {
    // 在可滚动范围内，允许默认滚动行为
    // 但确保鼠标不会穿透
    if (window.api) window.api.setIgnoreMouse(false);
  } else if ((e.deltaY < 0 && !canScrollUp) || (e.deltaY > 0 && !canScrollDown)) {
    // 到达边界时阻止默认行为（防止页面整体滚动）
    e.preventDefault();
  }
}, { passive: false });

const MONTHS = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];

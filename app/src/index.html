function calNavigate(dir) {
  if (calView === 'month') {
    calCursor = new Date(calCursor.getFullYear(), calCursor.getMonth() + dir, 1);
  } else if (calView === 'week') {
    calCursor = new Date(calCursor.getTime() + dir * 7 * 86400000);
  } else {
    calCursor = new Date(calCursor.getTime() + dir * 86400000);
  }
  renderCal();
}

// helpers
function isSameDay(a, b) {
  return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
}
function startOfWeek(d) {
  const r = new Date(d); r.setHours(0,0,0,0);
  r.setDate(r.getDate() - r.getDay()); return r;
}
function addDays(d, n) { return new Date(d.getTime() + n*86400000); }

function filteredTodos() {
  return calCatFilt === 'all' ? todos : todos.filter(t => t.cat === calCatFilt);
}

function todosOnDay(date) {
  return filteredTodos().filter(t => {
    if (!t.createdAt) return false;
    return isSameDay(new Date(t.createdAt), date);
  });
}

// ── render dispatcher ──
function renderCal() {
  calBody.innerHTML = '';
  const today = new Date();

  if (calView === 'month') {
    renderMonth(today);
  } else if (calView === 'week') {
    renderWeek(today);
  } else {
    renderDay(today);
  }
}

// ── Month view ──
function renderMonth(today) {
  const y = calCursor.getFullYear(), m = calCursor.getMonth();
  calNavTitle.textContent = y + '年 ' + MONTHS[m];

  const firstDay    = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const daysInPrev  = new Date(y, m, 0).getDate();

  let html = '<div class="month-grid">';
  html += '<div class="month-dow">' + DOWS.map(d=>'<span>'+d+'</span>').join('') + '</div>';
  html += '<div class="month-cells">';

  const cells = [];
  for (let i = firstDay-1; i >= 0; i--) cells.push({ date: new Date(y,m-1,daysInPrev-i), other:true });
  for (let d = 1; d <= daysInMonth; d++) cells.push({ date: new Date(y,m,d), other:false });
  const remaining = 42 - cells.length;
  for (let d = 1; d <= remaining; d++) cells.push({ date: new Date(y,m+1,d), other:true });

  cells.forEach(cell => {
    const dayTodos = todosOnDay(cell.date);
    const isToday  = isSameDay(cell.date, today);
    const show     = dayTodos.slice(0, 3);
    const extra    = dayTodos.length - show.length;

    let chips = show.map(t => {
      const cls = t.migratedFrom ? 'migrated' : (t.cat||'work');
      return '<div class="month-mini-chip '+cls+(t.done?' done':'')+'">' +
        '<div class="month-mini-dot"></div>' +
        '<span class="month-mini-txt">'+esc(t.text)+'</span>' +
        '</div>';
    }).join('');
    if (extra > 0) chips += '<div class="month-cell-more">+'+extra+'</div>';

    html += '<div class="month-cell'+(cell.other?' other-month':'')+(isToday?' today':'')+'" data-date="'+cell.date.toISOString()+'">';
    html += '<div class="month-cell-num">'+cell.date.getDate()+'</div>';
    html += '<div class="month-cell-chips">'+chips+'</div>';
    html += '</div>';
  });

  html += '</div></div>';
  calBody.innerHTML = html;

  calBody.querySelectorAll('.month-cell:not(.other-month)').forEach(cell => {
    cell.addEventListener('click', () => {
      calCursor = new Date(cell.dataset.date);
      calView = 'day';
      document.querySelectorAll('.cal-vbtn').forEach(b=>b.classList.remove('on'));
      document.querySelector('.cal-vbtn[data-view="day"]').classList.add('on');
      renderCal();
    });
  });

  const monthTodos = filteredTodos().filter(t => {
    if (!t.createdAt) return false;
    const d = new Date(t.createdAt);
    return d.getFullYear()===y && d.getMonth()===m;
  });
  calFtInfo.textContent = monthTodos.length + ' 项任务（本月）';
  calSub.textContent = y + '年 ' + MONTHS[m];
}

// ── Week view — vertical card columns ──
function renderWeek(today) {
  const weekStart = startOfWeek(calCursor);
  const weekEnd   = addDays(weekStart, 6);
  calNavTitle.textContent = fmtShortDate(weekStart) + ' – ' + fmtShortDate(weekEnd);

  const DOW_LABELS = ['周日','周一','周二','周三','周四','周五','周六'];

  let html = '<div class="week-wrap"><div class="week-cols">';

  for (let i = 0; i < 7; i++) {
    const d = addDays(weekStart, i);
    const isT = isSameDay(d, today);
    const dayTs = todosOnDay(d);
    const show  = dayTs.slice(0, 5);
    const extra = dayTs.length - show.length;

    html += '<div class="week-col'+(isT?' is-today':'')+'">';
    html += '<div class="week-col-hd">';
    html += '<div class="week-col-dow">'+(isT?'今天':DOW_LABELS[d.getDay()])+'</div>';
    html += '<div class="week-col-date">'+((d.getMonth()+1)+'/'+d.getDate())+'</div>';
    html += '</div>';
    html += '<div class="week-col-body">';
    if (dayTs.length === 0) {
      html += '<div class="week-col-empty">暂无任务</div>';
    } else {
      show.forEach(t => {
        const cat = t.migratedFrom ? 'migrated' : (t.cat||'work');
        const prog = t.progress || 0;
        html += '<div class="wk-card '+cat+(t.done?' done':'')+'">';
        html += '<div class="wk-card-time">'+fmtT(t.createdAt)+'</div>';
        html += '<div class="wk-card-txt">'+esc(t.text)+'</div>';
        if (t.migratedFrom) html += '<div class="wk-card-migrate-tag">⇢ 昨日</div>';
        if (prog > 0 && prog < 100) html += '<div class="wk-card-prog">'+prog+'%</div>';
        html += '</div>';
      });
      if (extra > 0) html += '<div class="week-col-count">+'+extra+' 项任务</div>';
    }
    html += '</div></div>';
  }

  html += '</div></div>';
  calBody.innerHTML = html;

  calBody.querySelectorAll('.week-col-hd').forEach((hd, i) => {
    hd.style.cursor = 'pointer';
    hd.addEventListener('click', () => {
      calCursor = addDays(weekStart, i);
      calView = 'day';
      document.querySelectorAll('.cal-vbtn').forEach(b=>b.classList.remove('on'));
      document.querySelector('.cal-vbtn[data-view="day"]').classList.add('on');
      renderCal();
    });
  });

  const weekTodos = filteredTodos().filter(t => {
    if (!t.createdAt) return false;
    const d = new Date(t.createdAt); d.setHours(0,0,0,0);
    return d >= weekStart && d <= weekEnd;
  });
  calFtInfo.textContent = weekTodos.length + ' 项任务（本周）';
  calSub.textContent = fmtShortDate(weekStart) + ' 这一周';
}

// ── Day view with progress ring ──
function renderDay(today) {
  const isToday = isSameDay(calCursor, today);
  const DOW_FULL = ['周日','周一','周二','周三','周四','周五','周六'];
  calNavTitle.textContent = fmtFullDate(calCursor) + ' ' + DOW_FULL[calCursor.getDay()];
  calSub.textContent = isToday ? '今天' : fmtShortDate(calCursor);

  const dayTodos = todosOnDay(calCursor);
  const pending  = dayTodos.filter(t=>!t.done);
  const done     = dayTodos.filter(t=> t.done);
  const total    = dayTodos.length;
  const doneN    = done.length;
  // 完成度计算：迁移任务贡献0分，有进度的按progress/100计分，普通完成贡献1分
  const scoreSum = dayTodos.reduce((sum, t) => {
    if (!t.done) return sum;                          // 未完成：0分
    if (t.migratedFrom) return sum;                   // 迁移完成：0分
    const prog = typeof t.progress === 'number' ? t.progress : 0;
    if (prog > 0 && prog < 100) return sum + prog / 100; // 部分完成：按进度计分
    return sum + 1;                                   // 完整完成：1分
  }, 0);
  const pct = total === 0 ? 0 : Math.round(scoreSum / total * 100);

  const R = 28, C = 34, stroke = 5;
  const circ = 2 * Math.PI * R;
  const dash  = (pct / 100) * circ;
  const ring  = '<svg class="day-ring-svg" width="'+C*2+'" height="'+C*2+'" viewBox="0 0 '+C*2+' '+C*2+'">' +
    '<circle cx="'+C+'" cy="'+C+'" r="'+R+'" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="'+stroke+'"/>' +
    '<circle cx="'+C+'" cy="'+C+'" r="'+R+'" fill="none" stroke="#4ade80" stroke-width="'+stroke+'" stroke-linecap="round"' +
    ' stroke-dasharray="'+dash+' '+circ+'" stroke-dashoffset="'+(circ/4)+'" transform="rotate(-90 '+C+' '+C+')" />' +
    '<text x="'+C+'" y="'+(C+5)+'" text-anchor="middle" font-size="13" font-weight="700" fill="#fff" font-family="SF Mono,monospace">'+pct+'%</text>' +
    '</svg>';

  let html = '<div class="day-wrap">';
  html += '<div class="day-ring-row">' + ring;
  html += '<div class="day-ring-info">';
  html += '<div class="day-ring-label">今日完成度</div>';
  html += '<div class="day-ring-stat">'+doneN+' <span>/ '+total+' 任务已完成</span></div>';
  html += '</div></div>';

  if (total === 0) {
    html += '<div class="day-empty"><div class="day-empty-icon">📅</div><span>这天没有待办事项</span></div>';
  } else {
    function dayCard(t) {
      const cat = t.cat || 'work';
      const isMig = !!t.migratedFrom;
      const dotCls = isMig ? 'migrated' : cat;
      const prog = t.progress || 0;
      const doneType = t.doneType || '';

      let cardCls = 'day-card' + (t.done ? ' done' : '') + (isMig && !t.done ? ' migrated' : '');
      if (t.done) {
        if (doneType==='partial') cardCls += ' done-partial';
        else if (doneType==='zero') cardCls += ' done-zero';
        else if (isMig) cardCls += ' migrated';
      }

      let meta = '';
      if (isMig && !t.done) {
        meta += '<span class="day-card-migrate-badge">⇢ 从昨日迁移</span>';
        if (t.migratedFrom) meta += '<span class="day-card-time"> 创建于 '+fmtShortDate(new Date(t.migratedFrom))+'</span>';
      }
      if (t.done && isMig) meta += '<span class="day-card-done-badge migrated-done">⇢ 迁移完成</span>';
      else if (t.done && doneType==='partial') meta += '<span class="day-card-done-badge partial">完成一部分</span>';
      else if (t.done && doneType==='zero')    meta += '<span class="day-card-done-badge zero">完全未做</span>';
      if (t.doneAt) meta += '<span class="day-card-time"> '+fmtT(t.doneAt)+' 完成</span>';
      else if (!isMig && t.createdAt) meta += '<span class="day-card-time">'+fmtT(t.createdAt)+' 创建</span>';

      const catLabel = cat==='work'?'工作':'个人';
      const progTxt  = prog > 0 && prog < 100 ? '<div class="day-card-prog">'+prog+'%</div>' : '';

      return '<div class="'+cardCls+'">'+
        '<div class="day-card-dot '+dotCls+'"></div>'+
        '<div class="day-card-main">'+
          '<div class="day-card-txt">'+esc(t.text)+'</div>'+
          (meta ? '<div class="day-card-meta">'+meta+'</div>' : '')+
        '</div>'+
        '<div class="day-card-right">'+
          '<span class="day-card-cat '+cat+'">'+catLabel+'</span>'+
          progTxt+
        '</div>'+
        '</div>';
    }

    if (pending.length) {
      html += '<div class="day-section-hd">待完成 '+pending.length+'</div>';
      html += pending.map(dayCard).join('');
    }
    if (done.length) {
      html += '<div class="day-section-hd">已完成 '+done.length+'</div>';
      html += done.map(dayCard).join('');
    }
  }

  html += '</div>';
  calBody.innerHTML = html;
  calFtInfo.textContent = total + ' 项任务 · ' + pending.length + ' 待完成';
}

// date format helpers
function fmtShortDate(d) { return (d.getMonth()+1)+'月'+d.getDate()+'日'; }
function fmtFullDate(d)  { return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日'; }

const settingsOpenBtn  = document.getElementById('settings-open-btn');

// ══════════════════════════════════
//   SHORTCUT CUSTOMIZATION
// ══════════════════════════════════

const MOD_NAMES = { ctrl:'Ctrl', alt:'Alt', shift:'Shift', meta:'⌘' };
const KEY_NAMES = { Enter:'Enter', Tab:'Tab', Escape:'Esc', Backspace:'Back', Delete:'Del', ' ':'Space' };

function formatShortcut(sc) {
  if (!sc) return '未设置';
  const parts = [];
  if (sc.ctrl)  parts.push('Ctrl');
  if (sc.alt)   parts.push('Alt');
  if (sc.shift) parts.push('Shift');
  if (sc.meta)  parts.push('⌘');
  const keyName = KEY_NAMES[sc.key] || sc.key.toUpperCase();
  parts.push(keyName);
  return parts.join('+');
}

function matchShortcut(e, sc) {
  if (!sc) return false;
  return (e.ctrlKey === sc.ctrl) && (e.altKey === sc.alt) &&
         (e.shiftKey === sc.shift) && (e.metaKey === sc.meta) &&
         (e.key === sc.key || e.key.toLowerCase() === sc.key.toLowerCase());
}

function shortcutFromEvent(e) {
  // Ignore lone modifier presses
  if (['Control','Alt','Shift','Meta'].includes(e.key)) return null;
  return { key: e.key, ctrl: e.ctrlKey, alt: e.altKey, shift: e.shiftKey, meta: e.metaKey };
}

// ── Shortcut recorder UI ──
const scBtns = {
  togglePanel: document.getElementById('sc-toggle-panel'),
  toggleInspo: document.getElementById('sc-toggle-inspo'),
};
const scResets = {
  togglePanel: document.getElementById('sc-toggle-panel-reset'),
  toggleInspo: document.getElementById('sc-toggle-inspo-reset'),
};
const DEFAULTS = {
  togglePanel: null,
  toggleInspo: null,
};

let recordingSc = null; // currently recording shortcut key name

function updateScLabels() {
  for (const [k, btn] of Object.entries(scBtns)) {
    btn.textContent = formatShortcut(cfg.shortcuts[k]);
  }
}

function startRecording(scKey) {
  // stop any previous recording
  if (recordingSc) scBtns[recordingSc].classList.remove('recording');
  recordingSc = scKey;
  scBtns[scKey].classList.add('recording');
  scBtns[scKey].textContent = '按下按键…';
}

function stopRecording() {
  if (recordingSc) {
    scBtns[recordingSc].classList.remove('recording');
    recordingSc = null;
  }
}

// bind record buttons
Object.keys(scBtns).forEach(scKey => {
  scBtns[scKey].addEventListener('click', e => {
    e.preventDefault();
    e.stopPropagation();
    startRecording(scKey);
  });
  scResets[scKey].addEventListener('click', e => {
    e.preventDefault();
    e.stopPropagation();
    cfg.shortcuts[scKey] = DEFAULTS[scKey] ? { ...DEFAULTS[scKey] } : null;
    saveCfg(); updateScLabels(); applySettings(); syncGlobalShortcuts();
  });
});

// listen for keydown when recording
document.addEventListener('keydown', e => {
  if (!recordingSc) return;
  // Escape cancels recording
  if (e.key === 'Escape') { stopRecording(); updateScLabels(); return; }

  const sc = shortcutFromEvent(e);
  if (!sc) return;

  // togglePanel / toggleInspo require at least one modifier
  if ((recordingSc === 'togglePanel' || recordingSc === 'toggleInspo') && !sc.ctrl && !sc.alt && !sc.shift && !sc.meta) {
    scBtns[recordingSc].textContent = '需修饰键';
    setTimeout(() => { if (recordingSc === 'togglePanel' || recordingSc === 'toggleInspo') scBtns[recordingSc].textContent = '按下按键…'; }, 800);
    return;
  }

  cfg.shortcuts[recordingSc] = sc;
  saveCfg();
  stopRecording();
  updateScLabels();
  applySettings();
  syncGlobalShortcuts();
}, true);

// ── Global shortcuts ──
function closeAll() {
  inspoOverlay.classList.remove('show');
  calOverlay.classList.remove('show');
  settingsOverlay.classList.remove('show');
  if (open) setPanelOpenState(false);
}

function hasAnyOverlay() {
  return inspoOverlay.classList.contains('show')
      || calOverlay.classList.contains('show')
      || settingsOverlay.classList.contains('show')
      || open;
}

// Handle toggle action (used by both global shortcut and document keydown)
function handleToggle(action) {
  if (action === 'togglePanel') {
    if (hasAnyOverlay()) {
      closeAll();
    } else {
      setPanelOpenState(true);
    }
  } else if (action === 'toggleInspo') {
    if (hasAnyOverlay()) {
      closeAll();
    } else {
      inspoOverlay.classList.add('show');
      if (window.api) window.api.setIgnoreMouse(false);
      setTimeout(() => inspoTextarea.focus(), 120);
    }
  }
}

// Register global shortcuts with Electron main process (works even without focus)
function syncGlobalShortcuts() {
  if (window.api && window.api.registerGlobalShortcuts) {
    window.api.registerGlobalShortcuts(cfg.shortcuts);
  }
}

// Listen for global shortcut events from main process
if (window.api && window.api.onGlobalShortcut) {
  window.api.onGlobalShortcut(action => handleToggle(action));
}

document.addEventListener('keydown', e => {
  const tag = e.target.tagName;
  const inInput = tag === 'INPUT' || tag === 'TEXTAREA';

  // Esc — close topmost layer, or close everything
  if (e.key === 'Escape') {
    if (recordingSc) { stopRecording(); updateScLabels(); return; }
    if (inspoOverlay.classList.contains('show'))   { inspoOverlay.classList.remove('show'); e.preventDefault(); return; }
    if (calOverlay.classList.contains('show'))      { calOverlay.classList.remove('show'); e.preventDefault(); return; }
    if (settingsOverlay.classList.contains('show')) { settingsOverlay.classList.remove('show'); e.preventDefault(); return; }
    if (open) { setPanelOpenState(false); e.preventDefault(); return; }
    return;
  }

  // Global toggle shortcuts — always fire regardless of focus
  if (cfg.shortcuts.togglePanel && matchShortcut(e, cfg.shortcuts.togglePanel)) {
    e.preventDefault();
    handleToggle('togglePanel');
    return;
  }

  if (cfg.shortcuts.toggleInspo && matchShortcut(e, cfg.shortcuts.toggleInspo)) {
    e.preventDefault();
    handleToggle('toggleInspo');
    return;
  }
});

// ── init ──
runMigration();
applySettings();
hideDone = true;
renderMitTasks();
render();
syncGlobalShortcuts();
</script>
